name: InazumaBot

on:
  workflow_dispatch:

  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

jobs:
  revisar-publicaciones:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar InazumaBot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RSS_URL: ${{ secrets.RSS_URL }}
        run: python main.py

      - name: Guardar última publicación
        run: |
          if git diff --quiet data/last_posts.json; then
            echo "No hay cambios que guardar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/last_posts.json
          git commit -m "Actualizar última publicación"
          git push